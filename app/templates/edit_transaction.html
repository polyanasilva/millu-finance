{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-box glass-panel" style="max-width: 500px;">
        <h2 style="color: #2979FF;">Editar Transação</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Ajuste os detalhes do seu
            lançamento "{{ transaction.title }}".</p>

        <form method="POST" action="">
            <div class="form-group">
                <label for="title">Descrição</label>
                <input type="text" id="title" name="title" class="form-control" value="{{ transaction.title }}"
                    required>
            </div>

            <div class="form-group">
                <label for="amount">Valor (R$)</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control"
                    value="{{ transaction.amount }}" required>
            </div>

            <div class="form-group">
                <label for="category">Categoria</label>
                <input type="text" id="category" name="category" class="form-control" value="{{ transaction.category }}"
                    required list="category-list">
                <datalist id="category-list">
                    {% if current_user.categories %}
                    {% for cat in current_user.categories.split(',') %}
                    <option value="{{ cat.strip() }}">
                        {% endfor %}
                        {% endif %}
                </datalist>
            </div>

            <button type="submit" class="btn btn-primary"
                style="background: linear-gradient(135deg, #2979FF 0%, #1565C0 100%);">Salvar Alterações</button>
            <a href="{{ url_for('main.history') }}"
                style="display: block; margin-top: 15px; color: var(--text-muted); text-decoration: none;">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
