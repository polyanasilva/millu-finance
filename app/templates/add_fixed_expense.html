{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-box glass-panel" style="max-width: 500px;">
        <h2 style="color: #2979FF;">Cadastrar Conta Fixa</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Crie contas que se repetem todo
            mês na mesma data.</p>

        <form method="POST" action="">
            <div class="form-group">
                <label for="title">Descrição da Conta</label>
                <input type="text" id="title" name="title" class="form-control" required
                    placeholder="Ex: Conta de Luz / Aluguel">
            </div>

            <div class="form-group">
                <label for="default_amount">Valor Base Estimado (R$)</label>
                <input type="number" step="0.01" id="default_amount" name="default_amount" class="form-control" required
                    placeholder="150.00">
                <small style="color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 5px;">Você poderá
                    ajustar esse valor toda vez que for pagar.</small>
            </div>

            <div class="form-group">
                <label for="due_day">Dia do Vencimento</label>
                <input type="number" id="due_day" name="due_day" class="form-control" required
                    placeholder="Avise-me todo dia..." min="1" max="31">
            </div>

            <div class="form-group">
                <label for="category">Categoria</label>
                <input type="text" id="category" name="category" class="form-control" required
                    placeholder="Ex: Moradia, Contas Básicas" list="category-list">
                <datalist id="category-list">
                    {% if current_user.categories %}
                    {% for cat in current_user.categories.split(',') %}
                    <option value="{{ cat.strip() }}">
                        {% endfor %}
                        {% endif %}
                </datalist>
            </div>

            <button type="submit" class="btn btn-primary"
                style="background: linear-gradient(135deg, #2979FF 0%, #1565C0 100%);">Criar Conta Fixa</button>
            <a href="{{ url_for('main.fixed_expenses') }}"
                style="display: block; margin-top: 15px; color: var(--text-muted); text-decoration: none;">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
