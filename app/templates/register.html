{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-box glass-panel">
        <h2>Crie sua conta</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="Milu Silva">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" required
                    placeholder="seunome@email.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="age">Idade</label>
                <input type="number" id="age" name="age" class="form-control" placeholder="25">
            </div>

            <div class="form-group">
                <label for="average_salary">Média Salarial (R$)</label>
                <input type="number" step="0.01" id="average_salary" name="average_salary" class="form-control"
                    placeholder="5000.00">
            </div>

            <div class="form-group">
                <label for="categories">Categorias Frequentes (separadas por vírgula)</label>
                <input type="text" id="categories" name="categories" class="form-control"
                    placeholder="Moradia, Alimentação, Transporte">
            </div>

            <button type="submit" class="btn btn-primary">Começar a organizar</button>
        </form>
        <div class="auth-footer">
            Já tem uma conta? <a href="{{ url_for('main.login') }}">Faça login</a>
        </div>
    </div>
</div>
{% endblock %}
