{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-box glass-panel" style="max-width: 500px;">
        <h2 style="color: #00E676;">Cadastrar Receita</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label for="title">Descrição da Receita</label>
                <input type="text" id="title" name="title" class="form-control" required
                    placeholder="Ex: Salário Mensal">
            </div>

            <div class="form-group">
                <label for="amount">Valor (R$)</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control" required
                    placeholder="5000.00">
            </div>

            <div class="form-group">
                <label for="category">Categoria / Origem</label>
                <input type="text" id="category" name="category" class="form-control" required
                    placeholder="Ex: Salário, Freelance, Rendimentos">
            </div>

            <button type="submit" class="btn btn-primary"
                style="background: linear-gradient(135deg, #00E676 0%, #1de9b6 100%); box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);">Adicionar
                Receita</button>
        </form>
    </div>
</div>
{% endblock %}
